                expression: ">= 0"
              config:
                severity: error

      - name: unique_customers
        description: "Number of distinct customer accounts that used this model in this region during the month."
        tests:
          - not_null

      - name: active_days
        description: "Number of distinct days with revenue activity in the month."
        tests:
