      - name: avg_daily_net_revenue
        description: "Average net revenue per active day in the month."

      - name: max_daily_net_revenue
        description: "Highest single-day net revenue in the month."

      - name: prior_month_gross_revenue
        description: "Gross revenue from the previous month for the same model + region. NULL for first month."

      - name: prior_month_net_revenue
        description: "Net revenue from the previous month. NULL for first month."

      - name: prior_month_unique_customers
        description: "Unique customers from the previous month. NULL for first month."

      - name: mom_gross_revenue_change
        description: "{{ doc('mom_change_definition') }} Applied to gross revenue at model + region grain."

      - name: mom_net_revenue_change
        description: "Month-over-month absolute change in net revenue."

      - name: mom_customer_change
        description: "Month-over-month change in unique customer count. Positive = customer growth."

      - name: mom_gross_revenue_pct_change
        description: "Month-over-month percentage change in gross revenue."

      - name: mom_net_revenue_pct_change
        description: "Month-over-month percentage change in net revenue."

