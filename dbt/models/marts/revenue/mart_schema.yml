version: 2

# ---------------------------------------------------------------------------
# Mart schema.yml — revenue mart models
# ---------------------------------------------------------------------------
# These are the final business-ready aggregations consumed by Metabase dashboards
# and the Finance team. All models read from int_revenue_daily.
#
# Model versioning (customer_revenue_monthly):
#   ref('customer_revenue_monthly')      → resolves to latest_version (v2 when ready)
#   ref('customer_revenue_monthly', v=1) → resolves to v1 explicitly
#   deprecation_date on v1 = compile-time warning only — run continues
#
# store_failures: true — failed test rows are stored in a separate schema
#   for investigation. Useful for revenue tests where you want to see
#   exactly which rows violated the rule, not just a count.
# ---------------------------------------------------------------------------

models:

  # ---------------------------------------------------------------------------
  # Customer revenue marts
  # ---------------------------------------------------------------------------
  - name: customer_revenue_monthly
    description: "{{ doc('customer_revenue_monthly_overview') }}"
    tags: ['revenue', 'customer', 'monthly', 'mart', 'incremental']

    latest_version: 1
    # latest_version: 2 — uncomment when v2 (with revenue_tier) is ready
    # ref('customer_revenue_monthly') resolves to this version

    config:
      contract:
        enforced: true
        # Contract enforcement — dbt validates column names and data_type
        # match exactly what the SQL produces. Fails at compile time if they
        # don't match — prevents silent schema drift from reaching consumers.
      access: public
        # public — other dbt projects can ref() this model.
        # protected (default) — same project only.
        # private — same group only.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_id, month_start_date]
          # Composite unique key test — no two rows can share the same
          # account_id + month_start_date combination.

    versions:
      - v: 1
        deprecation_date: "2026-06-01"
        # After this date dbt emits a compile-time warning for any model
        # still using ref('customer_revenue_monthly', v=1).
        # The run continues — deprecation_date is a warning, not a hard stop.
        defined_in: customer_revenue_monthly

    columns:
      - name: account_id
        description: "Customer account identifier. Foreign key to stg_customer_details."
        data_type: varchar
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customer_details')
                field: account_id
              config:
                severity: warn
                store_failures: true
                # store_failures: true — stores failing rows in a separate
                # schema so you can query which account_ids are orphaned.

      - name: company_name
        description: "Legal company name from CRM."
        data_type: varchar

      - name: segment
        description: "{{ doc('segment_definition') }}"
        data_type: varchar
        tests:
          - not_null
              config:
                severity: warn
                store_failures: true
                # store_failures: true — if you have accounts with missing segment,
                # you want to know which ones they are so you can fix the source data.

      - name: vertical
        description: "Industry vertical — Technology, Financial Services, Healthcare etc."
        data_type: varchar
        tests:
          - not_null
              config:
                severity: warn
                store_failures: true  


      - name: account_size
        description: "Company size classification — Enterprise, Mid-Market, SMB, Unknown."
        data_type: varchar
        tests:
          - not_null

      - name: month_start_date
        description: "First day of the calendar month. Part of the composite unique key."
        data_type: date
        tests:
          - not_null
              config:
                severity: warn
                store_failures: true
                # store_failures: true — if you have accounts with missing month_start_date,
                # you want to know which ones they are so you can fix the source data.


      - name: month_end_date
        description: "Last day of the calendar month."
        data_type: date
        tests:
          - not_null
              config:
                severity: warn
                store_failures: true
                # store_failures: true — if you have accounts with missing month_end_date,
                # you want to know which ones they are so you can fix the source data.
                

      - name: total_gross_revenue
        description: "Total gross revenue for the month before discounts and credits."
        data_type: numeric
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
              config:
                severity: error
                store_failures: true
                # error not warn — a mart row with zero or negative gross
                # revenue is a data error that must block the pipeline.

      - name: total_net_revenue
        description: "{{ doc('net_revenue_definition') }}"
        data_type: numeric
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                severity: error
                store_failures: true

      - name: active_days
        description: "Number of distinct days with revenue activity in the month."
        data_type: bigint
        tests:
          - not_null

      - name: avg_daily_net_revenue
        description: "Average net revenue per active day in the month."
        data_type: numeric

      - name: max_daily_net_revenue
        description: "Highest single-day net revenue in the month."
        data_type: numeric

      - name: min_daily_net_revenue
        description: "Lowest single-day net revenue in the month."
        data_type: numeric

      - name: prior_month_gross_revenue
        description: "Gross revenue from the previous calendar month. NULL for a customer's first month."
        data_type: numeric

      - name: prior_month_net_revenue
        description: "Net revenue from the previous calendar month. NULL for a customer's first month."
        data_type: numeric

      - name: mom_gross_revenue_change
        description: "{{ doc('mom_change_definition') }} Applied to gross revenue."
        data_type: numeric

      - name: mom_net_revenue_change
        description: "Month-over-month absolute change in net revenue. NULL for first month."
        data_type: numeric

      - name: mom_gross_revenue_pct_change
        description: "Month-over-month percentage change in gross revenue. NULL when prior month is zero or missing."
        data_type: numeric

      - name: mom_net_revenue_pct_change
        description: "Month-over-month percentage change in net revenue. NULL when prior month is zero or missing."
        data_type: numeric

