  - name: customer_revenue_ytd
    description: "Year-to-date revenue aggregated at the customer account level. One row per account for the current calendar year. Materialized as table — rebuilt nightly."
    tags: ['revenue', 'customer', 'ytd', 'mart']

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [account_id, year]

    columns:
      - name: account_id
        description: "Customer account identifier. Foreign key to stg_customer_details."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customer_details')
                field: account_id
              config:
                severity: warn

      - name: company_name
        description: "Legal company name from CRM."

      - name: segment
        description: "{{ doc('segment_definition') }}"
        tests:
          - not_null

      - name: vertical
        description: "Industry vertical."
        tests:
          - not_null

      - name: account_size
        description: "Company size classification."
        tests:
          - not_null

      - name: ytd_start_date
        description: "First day of the year with revenue activity."
        tests:
          - not_null

      - name: ytd_end_date
        description: "Most recent day with revenue activity in the current year."
        tests:
          - not_null

      - name: year
        description: "Calendar year — extracted from ytd_end_date."
        tests:
          - not_null

      - name: ytd_gross_revenue
        description: "Total gross revenue from January 1 to the most recent date."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
              config:
                severity: error

      - name: ytd_net_revenue
        description: "{{ doc('net_revenue_definition') }} Accumulated year-to-date."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                severity: error

      - name: active_days
        description: "Number of distinct days with revenue activity year-to-date."
        tests:
          - not_null

      - name: avg_daily_net_revenue
        description: "Average net revenue per active day year-to-date."

      - name: max_daily_net_revenue
        description: "Highest single-day net revenue year-to-date."

      - name: min_daily_net_revenue
        description: "Lowest single-day net revenue year-to-date."

      - name: active_months
        description: "Number of distinct months with revenue activity year-to-date."

      - name: avg_monthly_net_revenue
        description: "Average net revenue per active month year-to-date."

      - name: rank_in_segment
        description: "Revenue rank within the customer's segment — 1 = highest revenue. Recalculated nightly."

      - name: rank_in_vertical
        description: "Revenue rank within the customer's vertical — 1 = highest revenue."

      - name: rank_overall
        description: "Revenue rank across all customers — 1 = highest revenue."

      - name: cumulative_revenue_pct
        description: "Running cumulative percentage of total revenue when customers are sorted by YTD net revenue descending. Used for Pareto analysis — which customers make up 80% of revenue."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

  # ---------------------------------------------------------------------------
  # Model revenue marts
  # ---------------------------------------------------------------------------
  - name: model_revenue_monthly
    description: "Monthly revenue aggregated at the model + region grain. One row per model_variant + source_region + month. Incremental — appends new months, refreshes last 2 months."
    tags: ['revenue', 'model', 'monthly', 'mart', 'incremental']

